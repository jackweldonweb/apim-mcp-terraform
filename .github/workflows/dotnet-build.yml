name: .NET Build

on:
  pull_request:
    paths:
      - 'src/**'

jobs:
  build:
    name: build + test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      - name: Restore
        working-directory: src
        run: dotnet restore apim-mcp.sln

      - name: Build
        working-directory: src
        run: dotnet build apim-mcp.sln -c Release --no-restore

      # No unit tests in this reference implementation — the SampleRestApi,
      # SampleMcpServer, and SampleAgentClient are integration-tested by
      # running them against a real APIM instance.  Add unit test projects
      # here when the codebase grows.
